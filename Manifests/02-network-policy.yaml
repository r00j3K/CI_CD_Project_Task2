apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-policy
  namespace: medapp
spec:
  podSelector:
    matchLabels:
      app: mysql-db
  policyTypes:  
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: user-service
        - podSelector:
            matchLabels:
              app: appointment-service
        - podSelector:
            matchLabels:
              app: booking-service
      ports:
        - protocol: TCP
          port: 3306